<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicios</title>
  </head>
  <body>
    <h1>Ejercicios parte 1</h1>
    <script>
      const numeroPrimo = (numero = undefined) => {
        if (numero === undefined)
          return console.warn("No ingresaste un número");

        if (typeof numero !== "number")
          return console.error(
            `El valor "${numero}" ingresado, NO es un número`,
          );

        if (numero === 0) return console.error("El número no puede ser 0");

        if (numero === 1) return console.error("El número no puede ser 1");

        if (Math.sign(numero) === -1)
          return console.error("El número no puede ser negativo");

        let divisible = false;

        for (let i = 2; i < numero; i++) {
          if (numero % i === 0) {
            divisible = true;
            break;
          }
        }

        return divisible
          ? console.log(`El número ${numero}, NO es primo`)
          : console.log(`El número ${numero}, SÍ es primo`);
      };

      numeroPrimo();
      numeroPrimo(320);
      numeroPrimo(true);
      numeroPrimo(13);

      const numeroParImpar = (numero = undefined) => {
        if (numero === undefined)
          return console.warn("No ingresaste un número");

        if (typeof numero !== "number")
          return console.error(
            `El valor "${numero}" ingresado, NO es un número`,
          );

        return numero % 2 === 0
          ? console.info(`El número ${numero} es Par`)
          : console.info(`El número ${numero} es Impar`);
      };
    </script>
  </body>
</html>
